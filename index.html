<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥦 Market Duty Survey – July 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:   #2d6a4f;
    --green-lt:#52b788;
    --green-bg:#d8f3dc;
    --cream:   #fefae0;
    --amber:   #e9c46a;
    --red:     #e63946;
    --gray:    #6c757d;
    --white:   #ffffff;
    --shadow:  0 4px 24px rgba(45,106,79,.13);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #d8f3dc 0%, #b7e4c7 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px 64px;
  }

  .card {
    background: var(--white);
    border-radius: 20px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 560px;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--green);
    padding: 28px 32px 24px;
    color: var(--white);
  }
  .header-emoji { font-size: 2.4rem; display: block; margin-bottom: 6px; }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: 1.55rem; line-height: 1.25; }
  .header p  { margin-top: 6px; font-size: .9rem; opacity: .82; }

  /* ── Manager Glass Card (in header) ── */
  .manager-glass {
    margin-top: 18px;
    background: rgba(255,255,255,.14);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 16px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .manager-glass-avatar {
    width: 42px; height: 42px;
    background: rgba(255,255,255,.22);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.35);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.25rem;
    flex-shrink: 0;
  }
  .manager-glass-info { flex: 1; text-align: left; }
  .manager-glass-label { font-size: .66rem; font-weight: 600; color: rgba(255,255,255,.8); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
  .manager-glass-name  { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--white); }
  .manager-glass-contact { font-size: .8rem; margin-top: 2px; }
  .manager-glass-contact a { color: rgba(255,255,255,.9); text-decoration: none; font-weight: 600; }
  .manager-glass-contact a:hover { text-decoration: underline; }

  /* ── Form body ── */
  .form-body { padding: 20px 20px 24px; }

  .field { margin-bottom: 24px; }
  label  { display: block; font-weight: 600; font-size: .88rem; color: var(--green); margin-bottom: 8px; letter-spacing: .03em; text-transform: uppercase; }

  input[type="text"] {
    width: 100%;
    border: 2px solid #dee2e6;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 1rem;
    font-family: inherit;
    transition: border-color .2s;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--green-lt); }

  /* ── Calendar ── */
  .cal-header {
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--green);
  }

  .day-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 4px;
  }
  .day-label {
    text-align: center;
    font-size: .65rem;
    font-weight: 600;
    color: var(--gray);
    padding: 2px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .cal-day {
    aspect-ratio: 1;
    border-radius: 7px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: .78rem;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all .18s;
    position: relative;
    padding: 1px;
    min-height: 0;
  }
  .cal-day:hover:not(.taken):not(.empty):not(.past) {
    background: var(--green-bg);
    border-color: var(--green-lt);
  }
  .cal-day.selected {
    background: var(--green);
    color: var(--white);
    border-color: var(--green);
  }
  .cal-day.taken {
    background: #ffeef0;
    border-color: #ffccd1;
    cursor: not-allowed;
    color: var(--red);
  }
  .cal-day.empty { cursor: default; }
  .cal-day.past  { opacity: .35; cursor: not-allowed; }
  .day-tag {
    display: none;
  }

  .taken-name {
    font-size: .48rem;
    font-weight: 600;
    color: var(--red);
    text-align: center;
    line-height: 1;
    margin-top: 1px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
    padding: 0 1px;
  }

  .cal-day-num { line-height: 1; }

  /* ── Tooltip ── */
  .cal-day.taken:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    font-size: .75rem;
    padding: 5px 9px;
    border-radius: 7px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
  }

  /* ── Submit ── */
  .btn {
    width: 100%;
    padding: 13px;
    background: var(--green);
    color: var(--white);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    margin-top: 8px;
  }
  .btn:hover  { background: #1b4332; }
  .btn:active { transform: scale(.98); }

  .btn-secondary {
    background: var(--amber);
    color: #333;
    margin-top: 8px;
  }
  .btn-secondary:hover { background: #d4a957; }

  /* ── Toast ── */
  .toast {
    display: none;
    background: var(--green);
    color: var(--white);
    border-radius: 12px;
    padding: 14px 18px;
    margin-top: 18px;
    font-size: .95rem;
    text-align: center;
    font-weight: 500;
  }
  .toast.error { background: var(--red); }
  .toast.show  { display: block; }

  /* ── Bookings list ── */
  .bookings-section { border-top: 1px solid #f0f0f0; padding: 20px 32px 28px; }
  .bookings-section h3 { font-family: 'DM Serif Display', serif; color: var(--green); margin-bottom: 14px; font-size: 1.05rem; }
  .booking-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 10px;
    background: var(--green-bg); margin-bottom: 8px;
    font-size: .9rem;
  }
  .booking-date { font-weight: 700; color: var(--green); min-width: 52px; }
  .booking-name { color: #333; }
  .no-bookings  { color: var(--gray); font-size: .88rem; font-style: italic; }

  .export-btn {
    width: 100%;
    padding: 10px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
  }
  .export-btn:hover { background: #218838; }

  /* ── Loading ── */
  .loading { text-align: center; color: var(--gray); font-size: .88rem; padding: 12px 0; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <span class="header-emoji">🥕🛒</span>
    <h1>Market Duty Survey</h1>
    <p>Pick your date to buy vegetables — July 2026. One date per person.</p>

    <div class="manager-glass">
      <div class="manager-glass-avatar">👨‍💼</div>
      <div class="manager-glass-info">
        <div class="manager-glass-label">July 2026 Manager</div>
        <div class="manager-glass-name">Rohit</div>
        <div class="manager-glass-contact">📞 <a href="tel:8637564212">8637564212</a></div>
      </div>
    </div>
  </div>

  <div class="form-body">
    <!-- Name -->
    <div class="field">
      <label for="name">1. Your Name</label>
      <input type="text" id="name" placeholder="Enter your full name" autocomplete="off" />
    </div>

    <!-- Calendar -->
    <div class="field">
      <label>2. Choose Your Market Date</label>
      <div class="cal-header">📅 July 2026</div>

      <div class="day-labels">
        <div class="day-label">Sun</div>
        <div class="day-label">Mon</div>
        <div class="day-label">Tue</div>
        <div class="day-label">Wed</div>
        <div class="day-label">Thu</div>
        <div class="day-label">Fri</div>
        <div class="day-label">Sat</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <div class="loading" id="loadingMsg">Loading bookings…</div>
    <button class="btn" id="submitBtn" style="display:none" onclick="submitSurvey()">✅ Confirm My Duty Date</button>
    <div class="toast" id="toast"></div>
  </div>

  <div class="bookings-section">
    <h3>📋 Current Duty Schedule</h3>
    <div id="bookingsList"><p class="no-bookings">Loading…</p></div>
    <button class="export-btn" onclick="exportToExcel()">📊 Export to Excel</button>
  </div>
</div>

<script>
  // ── LocalStorage Configuration ──
  const STORAGE_KEY = "marketDutyBookings";

  // ── State ──
  let selectedDate = null;
  let bookings = {}; // { "2026-07-DD": "Name" }

  // July 2026: starts on Wednesday (day index 3), 31 days
  const YEAR = 2026, MONTH = 6; // JS month 0-indexed
  const TOTAL_DAYS = 31;
  const START_DOW  = new Date(2026, 6, 1).getDay(); // Dynamically get correct DOW

  // ── LocalStorage Functions ──
  function loadBookings() {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      bookings = stored ? JSON.parse(stored) : {};
    } catch (e) {
      console.error("Error loading bookings:", e);
      bookings = {};
    }

    renderCalendar();
    renderBookingsList();
    document.getElementById("loadingMsg").style.display = "none";
    document.getElementById("submitBtn").style.display = "block";
  }

  function saveBookings() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bookings));
      return true;
    } catch (e) {
      console.error("Error saving bookings:", e);
      showToast("❌ Error saving to local storage.", true);
      return false;
    }
  }

  function exportToExcel() {
    try {
      const data = [];
      
      // Add header
      data.push(["Date", "Day", "Name"]);
      
      // Add booking entries
      Object.entries(bookings).sort((a, b) => a[0].localeCompare(b[0])).forEach(([key, name]) => {
        const day = parseInt(key.split("-")[2]);
        const date = new Date(2026, 6, day);
        const weekday = date.toLocaleDateString("en-IN", { weekday: "long" });
        const fullDate = `July ${day}, 2026`;
        data.push([fullDate, weekday, name]);
      });

      // Create workbook
      const ws = XLSX.utils.aoa_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Market Duty");

      // Style the header row
      ws['A1'].s = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "2d6a4f" } } };
      ws['B1'].s = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "2d6a4f" } } };
      ws['C1'].s = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "2d6a4f" } } };

      // Auto-fit columns
      ws['!cols'] = [{ wch: 15 }, { wch: 12 }, { wch: 20 }];

      // Download
      XLSX.writeFile(wb, `Market_Duty_July2026_${new Date().toISOString().split('T')[0]}.xlsx`);
      showToast(`📊 Excel file downloaded!`);
    } catch (e) {
      console.error("Error exporting to Excel:", e);
      showToast("❌ Error exporting to Excel.", true);
    }
  }

  // ── Calendar ──
  function dateKey(day) {
    return `2026-07-${String(day).padStart(2,"0")}`;
  }

  function renderCalendar() {
    const grid = document.getElementById("calGrid");
    grid.innerHTML = "";

    // Empty cells before July 1
    for (let i = 0; i < START_DOW; i++) {
      const empty = document.createElement("div");
      empty.className = "cal-day empty";
      grid.appendChild(empty);
    }

    for (let d = 1; d <= TOTAL_DAYS; d++) {
      const key   = dateKey(d);
      const takenBy = bookings[key];
      const isSelected = selectedDate === key;

      const cell = document.createElement("div");
      const dow = (START_DOW + (d - 1)) % 7;
      cell.className = "cal-day";

      const numEl = document.createElement("div");
      numEl.className = "cal-day-num";
      numEl.textContent = d;
      cell.appendChild(numEl);

      if (takenBy) {
        cell.classList.add("taken");
        cell.setAttribute("data-tooltip", `Taken by ${takenBy}`);
        const nameEl = document.createElement("div");
        nameEl.className = "taken-name";
        nameEl.textContent = takenBy.split(" ")[0];
        cell.appendChild(nameEl);
      } else if (isSelected) {
        cell.classList.add("selected");
      } else {
        cell.addEventListener("click", () => selectDate(key));
      }

      grid.appendChild(cell);
    }
  }

  function selectDate(key) {
    if (bookings[key]) return;
    selectedDate = (selectedDate === key) ? null : key;
    renderCalendar();
  }

  // ── Bookings list ──
  function renderBookingsList() {
    const el = document.getElementById("bookingsList");
    const entries = Object.entries(bookings).sort((a,b) => a[0].localeCompare(b[0]));
    if (!entries.length) {
      el.innerHTML = '<p class="no-bookings">No dates booked yet. Be the first!</p>';
      return;
    }
    el.innerHTML = entries.map(([key, name]) => {
      const day = parseInt(key.split("-")[2]);
      const date = new Date(2026, 6, day);
      const weekday = date.toLocaleDateString("en-IN", { weekday: "short" });
      return `<div class="booking-item">
        <span class="booking-date">Jul ${day}</span>
        <span style="color:var(--gray);font-size:.8rem">${weekday}</span>
        <span class="booking-name">🧑 ${name}</span>
      </div>`;
    }).join("");
  }

  // ── Submit ──
  function showToast(msg, isError = false) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show" + (isError ? " error" : "");
    setTimeout(() => t.className = "toast", 4000);
  }

  async function submitSurvey() {
    const name = document.getElementById("name").value.trim();
    if (!name)         { showToast("⚠️ Please enter your name.", true); return; }
    if (!selectedDate) { showToast("⚠️ Please select a date on the calendar.", true); return; }
    if (bookings[selectedDate]) { showToast("⚠️ That date was just taken! Please pick another.", true); renderCalendar(); return; }

    // Check if this name already booked
    const existingEntry = Object.entries(bookings).find(([,n]) => n.toLowerCase() === name.toLowerCase());
    if (existingEntry) {
      const [existKey] = existingEntry;
      const day = parseInt(existKey.split("-")[2]);
      showToast(`⚠️ You already booked July ${day}. Each person can only pick one date.`, true);
      return;
    }

    bookings[selectedDate] = name;
    const day = parseInt(selectedDate.split("-")[2]);

    const saved = saveBookings();
    if (saved) {
      showToast(`🎉 Done! ${name} is on duty for July ${day}, 2026.`);
      selectedDate = null;
      document.getElementById("name").value = "";
      renderCalendar();
      renderBookingsList();
    }
  }

  // ── Init ──
  loadBookings();
</script>
</body>
</html>
