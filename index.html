<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>July 2026 Market Survey - Schedule Your Visit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        @media (max-width: 968px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Form Section */
        .form-section {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .form-section h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .form-section p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .calendar-container {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .calendar-header button:hover {
            background: #764ba2;
        }

        .calendar-header h3 {
            color: #333;
            font-size: 16px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: 600;
            color: #667eea;
            font-size: 12px;
            padding: 8px;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            background: white;
            transition: all 0.3s;
            font-weight: 500;
        }

        .calendar-day:hover:not(.disabled):not(.empty) {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .calendar-day.empty {
            cursor: default;
            background: transparent;
            border: none;
        }

        .calendar-day.disabled {
            color: #ccc;
            cursor: not-allowed;
            background: #f0f0f0;
            border-color: #e0e0e0;
        }

        .calendar-day.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
            font-weight: 700;
        }

        .calendar-day.booked {
            background: #ffcccc;
            color: #c33;
            border-color: #ff6666;
            cursor: not-allowed;
        }

        .selected-date {
            margin-top: 15px;
            padding: 15px;
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            border-radius: 5px;
            color: #2e7d32;
            font-weight: 600;
            display: none;
        }

        .selected-date.active {
            display: block;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 30px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Bookings Section */
        .bookings-section {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .bookings-section h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .bookings-section p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .bookings-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .booking-item {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .booking-item:hover {
            background: #efefef;
            transform: translateX(5px);
        }

        .booking-date {
            font-weight: 700;
            color: #667eea;
            font-size: 16px;
        }

        .booking-name {
            color: #333;
            font-weight: 500;
            margin-top: 5px;
            font-size: 14px;
        }

        .booking-info {
            flex: 1;
        }

        .booking-badge {
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-style: italic;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .export-btn {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .export-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Form Section -->
        <div class="form-section">
            <h1>📋 July 2026 Market Survey</h1>
            <p>Schedule your market visit for vegetable shopping</p>

            <div id="formMessage" class="message"></div>

            <form id="surveyForm">
                <div class="form-group">
                    <label for="memberName">Your Name *</label>
                    <input type="text" id="memberName" name="memberName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Select Date from July 2026 *</label>
                    <div class="calendar-container">
                        <div class="calendar-header">
                            <button type="button" id="prevMonth">← Previous</button>
                            <h3 id="monthYear">July 2026</h3>
                            <button type="button" id="nextMonth">Next →</button>
                        </div>
                        <div class="weekdays">
                            <div class="weekday">Sun</div>
                            <div class="weekday">Mon</div>
                            <div class="weekday">Tue</div>
                            <div class="weekday">Wed</div>
                            <div class="weekday">Thu</div>
                            <div class="weekday">Fri</div>
                            <div class="weekday">Sat</div>
                        </div>
                        <div class="calendar-days" id="calendarDays"></div>
                    </div>
                    <div class="selected-date" id="selectedDate"></div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Submit Survey</button>
            </form>
        </div>

        <!-- Bookings Section -->
        <div class="bookings-section">
            <h2>📅 Current Bookings</h2>
            <p>Dates booked by group members</p>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="totalBookings">0</div>
                    <div class="stat-label">Total Bookings</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="availableDates">31</div>
                    <div class="stat-label">Available Dates</div>
                </div>
            </div>

            <div class="bookings-list" id="bookingsList">
                <div class="empty-message">No bookings yet. Be the first to schedule your visit!</div>
            </div>

            <button class="export-btn" onclick="exportToExcel()">📊 Export to Excel</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'july2026_bookings';
        
        let selectedDate = null;
        let currentMonth = 7; // July
        let currentYear = 2026;
        let bookings = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderCalendar();
            loadBookings();
            setupEventListeners();
            setInterval(loadBookings, 3000); // Auto-refresh every 3 seconds
        });

        function setupEventListeners() {
            document.getElementById('prevMonth').addEventListener('click', (e) => {
                e.preventDefault();
                if (currentMonth === 7 && currentYear === 2026) {
                    return; // Don't go before July 2026
                }
                currentMonth--;
                if (currentMonth < 1) {
                    currentMonth = 12;
                    currentYear--;
                }
                renderCalendar();
            });

            document.getElementById('nextMonth').addEventListener('click', (e) => {
                e.preventDefault();
                currentMonth++;
                if (currentMonth > 12) {
                    currentMonth = 1;
                    currentYear++;
                }
                renderCalendar();
            });

            document.getElementById('surveyForm').addEventListener('submit', handleSubmit);
        }

        function renderCalendar() {
            const calendarDays = document.getElementById('calendarDays');
            const monthYear = document.getElementById('monthYear');
            
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                             'July', 'August', 'September', 'October', 'November', 'December'];
            
            monthYear.textContent = `${monthNames[currentMonth - 1]} ${currentYear}`;
            
            // Clear previous days
            calendarDays.innerHTML = '';
            
            // Get first day of month and number of days
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            // Add empty cells for days before month starts
            for (let i = 0; i < firstDay; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'calendar-day empty';
                calendarDays.appendChild(emptyDay);
            }
            
            // Add days of month
            for (let day = 1; day <= daysInMonth; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'calendar-day';
                dayCell.textContent = day;
                
                const dateStr = formatDate(new Date(currentYear, currentMonth - 1, day));
                
                // Check if date is booked
                const isBooked = bookings.some(b => b.date === dateStr);
                
                // Disable past dates (only if viewing July 2026)
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const cellDate = new Date(currentYear, currentMonth - 1, day);
                cellDate.setHours(0, 0, 0, 0);
                const isPast = cellDate < today && currentMonth === 7 && currentYear === 2026;
                
                if (isBooked) {
                    dayCell.classList.add('booked');
                    dayCell.style.cursor = 'not-allowed';
                } else if (isPast) {
                    dayCell.classList.add('disabled');
                } else {
                    dayCell.addEventListener('click', () => selectDate(dateStr, dayCell));
                }
                
                if (selectedDate === dateStr) {
                    dayCell.classList.add('selected');
                }
                
                calendarDays.appendChild(dayCell);
            }
        }

        function selectDate(dateStr, element) {
            // Remove previous selection
            document.querySelectorAll('.calendar-day.selected').forEach(el => {
                el.classList.remove('selected');
            });
            
            selectedDate = dateStr;
            element.classList.add('selected');
            
            const date = new Date(dateStr);
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formatted = date.toLocaleDateString('en-US', options);
            
            const selectedDateDiv = document.getElementById('selectedDate');
            selectedDateDiv.innerHTML = `✓ Selected: <strong>${formatted}</strong>`;
            selectedDateDiv.classList.add('active');
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        async function handleSubmit(e) {
            e.preventDefault();
            
            const name = document.getElementById('memberName').value.trim();
            const messageDiv = document.getElementById('formMessage');
            
            if (!name) {
                showMessage('Please enter your name', 'error', messageDiv);
                return;
            }
            
            if (!selectedDate) {
                showMessage('Please select a date', 'error', messageDiv);
                return;
            }
            
            // Check if name already exists
            if (bookings.some(b => b.name.toLowerCase() === name.toLowerCase())) {
                showMessage('This name is already registered. Each member can only book once.', 'error', messageDiv);
                return;
            }
            
            // Check if date is already booked
            if (bookings.some(b => b.date === selectedDate)) {
                showMessage('This date is already booked by someone else!', 'error', messageDiv);
                renderCalendar();
                return;
            }
            
            // Add booking
            const newBooking = {
                name: name,
                date: selectedDate,
                timestamp: new Date().toISOString()
            };
            
            bookings.push(newBooking);
            
            // Save to localStorage
            saveBookings();
            
            showMessage(`✓ Success! ${name} is scheduled for ${selectedDate}`, 'success', messageDiv);
            
            // Reset form
            setTimeout(() => {
                document.getElementById('surveyForm').reset();
                selectedDate = null;
                document.getElementById('selectedDate').classList.remove('active');
                document.querySelectorAll('.calendar-day.selected').forEach(el => {
                    el.classList.remove('selected');
                });
                renderCalendar();
                loadBookings();
                messageDiv.innerHTML = '';
            }, 2000);
        }

        function saveBookings() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(bookings));
            } catch (error) {
                console.error('Error saving bookings:', error);
                showMessage('Error saving booking. Please try again.', 'error', document.getElementById('formMessage'));
            }
        }

        function loadBookings() {
            try {
                // Load from localStorage
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    bookings = JSON.parse(stored);
                } else {
                    bookings = [];
                }
                
                updateBookingsList();
                renderCalendar();
            } catch (error) {
                console.error('Error loading bookings:', error);
            }
        }

        function updateBookingsList() {
            const bookingsList = document.getElementById('bookingsList');
            const totalBookings = document.getElementById('totalBookings');
            const availableDates = document.getElementById('availableDates');
            
            totalBookings.textContent = bookings.length;
            availableDates.textContent = 31 - bookings.length;
            
            if (bookings.length === 0) {
                bookingsList.innerHTML = '<div class="empty-message">No bookings yet. Be the first to schedule your visit!</div>';
                return;
            }
            
            // Sort bookings by date
            const sorted = [...bookings].sort((a, b) => new Date(a.date) - new Date(b.date));
            
            bookingsList.innerHTML = sorted.map((booking, index) => {
                const date = new Date(booking.date);
                const formatted = date.toLocaleDateString('en-US', { 
                    weekday: 'short', 
                    month: 'short', 
                    day: 'numeric' 
                });
                return `
                    <div class="booking-item">
                        <div class="booking-info">
                            <div class="booking-date">${formatted}</div>
                            <div class="booking-name">👤 ${booking.name}</div>
                        </div>
                        <div class="booking-badge">#${index + 1}</div>
                    </div>
                `;
            }).join('');
        }

        function exportToExcel() {
            try {
                const data = [];
                
                // Add header
                data.push(["Date", "Day", "Name"]);
                
                // Add booking entries
                const sorted = [...bookings].sort((a, b) => new Date(a.date) - new Date(b.date));
                sorted.forEach((booking, index) => {
                    const date = new Date(booking.date);
                    const weekday = date.toLocaleDateString('en-US', { weekday: 'long' });
                    const fullDate = `July ${date.getDate()}, 2026`;
                    data.push([fullDate, weekday, booking.name]);
                });

                // Create workbook
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Market Bookings");

                // Style the header row
                ws['A1'].s = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "667eea" } } };
                ws['B1'].s = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "667eea" } } };
                ws['C1'].s = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "667eea" } } };

                // Auto-fit columns
                ws['!cols'] = [{ wch: 15 }, { wch: 12 }, { wch: 20 }];

                // Download
                XLSX.writeFile(wb, `Market_Bookings_July2026_${new Date().toISOString().split('T')[0]}.xlsx`);
                showMessage('📊 Excel file downloaded!', 'success', document.getElementById('formMessage'));
            } catch (error) {
                console.error('Error exporting to Excel:', error);
                showMessage('Error exporting to Excel. Please try again.', 'error', document.getElementById('formMessage'));
            }
        }

        function showMessage(text, type, element) {
            element.textContent = text;
            element.className = `message ${type}`;
            setTimeout(() => {
                element.className = 'message';
            }, 5000);
        }
    </script>
</body>
</html>
