<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>July 2026 Market Survey - Schedule Your Visit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        @media (max-width: 968px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Form Section */
        .form-section {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .form-section h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .form-section p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .calendar-container {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .calendar-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h3 {
            color: #333;
            font-size: 20px;
            font-weight: 600;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: 600;
            color: #667eea;
            font-size: 12px;
            padding: 8px;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            background: white;
            transition: all 0.3s;
            font-weight: 500;
            position: relative;
            padding: 2px;
        }

        .calendar-day-num {
            font-size: 16px;
            font-weight: 700;
        }

        .calendar-day-name {
            font-size: 9px;
            color: #c33;
            margin-top: 2px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
            text-align: center;
        }

        .calendar-day:hover:not(.disabled):not(.empty):not(.booked) {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .calendar-day.empty {
            cursor: default;
            background: transparent;
            border: none;
        }

        .calendar-day.disabled {
            color: #ccc;
            cursor: not-allowed;
            background: #f0f0f0;
            border-color: #e0e0e0;
        }

        .calendar-day.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .calendar-day.selected .calendar-day-name {
            color: white;
        }

        .calendar-day.booked {
            background: #ffcccc;
            color: #c33;
            border-color: #ff6666;
            cursor: not-allowed;
        }

        .calendar-day.booked:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            font-size: 11px;
            padding: 6px 10px;
            border-radius: 5px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 10;
        }

        .selected-date {
            margin-top: 15px;
            padding: 15px;
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            border-radius: 5px;
            color: #2e7d32;
            font-weight: 600;
            display: none;
        }

        .selected-date.active {
            display: block;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 30px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Bookings Section */
        .bookings-section {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .bookings-section h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .bookings-section p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .refresh-status {
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
            text-align: center;
        }

        .refresh-status.loading {
            color: #667eea;
            font-weight: 600;
        }

        .bookings-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .booking-item {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .booking-item:hover {
            background: #efefef;
            transform: translateX(5px);
        }

        .booking-date {
            font-weight: 700;
            color: #667eea;
            font-size: 16px;
            min-width: 70px;
        }

        .booking-name {
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .booking-info {
            flex: 1;
        }

        .booking-badge {
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-style: italic;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .export-btn {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .export-btn:hover {
            background: #218838;
        }

        .manager-info {
            background: #f0f8ff;
            padding: 12px;
            border-radius: 5px;
            font-size: 13px;
            color: #0c5460;
            margin-bottom: 20px;
            border-left: 4px solid #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Form Section -->
        <div class="form-section">
            <h1>📋 July 2026 Market Survey</h1>
            <p>Schedule your market visit for vegetable shopping</p>

            <div class="manager-info">
                👨‍💼 <strong>Manager:</strong> Rohit Darbar | 📞 8637564212
            </div>

            <div id="formMessage" class="message"></div>

            <form id="surveyForm">
                <div class="form-group">
                    <label for="memberName">Your Name *</label>
                    <input type="text" id="memberName" name="memberName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Select Date from July 2026 *</label>
                    <div class="calendar-container">
                        <div class="calendar-header">
                            <h3 id="monthYear">📅 July 2026</h3>
                        </div>
                        <div class="weekdays">
                            <div class="weekday">Sun</div>
                            <div class="weekday">Mon</div>
                            <div class="weekday">Tue</div>
                            <div class="weekday">Wed</div>
                            <div class="weekday">Thu</div>
                            <div class="weekday">Fri</div>
                            <div class="weekday">Sat</div>
                        </div>
                        <div class="calendar-days" id="calendarDays"></div>
                    </div>
                    <div class="selected-date" id="selectedDate"></div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Submit Survey</button>
            </form>
        </div>

        <!-- Bookings Section -->
        <div class="bookings-section">
            <h2>📅 Current Bookings</h2>
            <p>Dates booked by all group members</p>

            <div class="refresh-status" id="refreshStatus">
                ⟳ Loading bookings...
            </div>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="totalBookings">0</div>
                    <div class="stat-label">Total Bookings</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="availableDates">31</div>
                    <div class="stat-label">Available Dates</div>
                </div>
            </div>

            <div class="bookings-list" id="bookingsList">
                <div class="empty-message">Loading bookings...</div>
            </div>

            <button class="export-btn" onclick="exportToExcel()">📊 Export to Excel</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'july2026_bookings';
        
        let selectedDate = null;
        let bookings = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadBookings();
            renderCalendar();
            setupEventListeners();
            // Auto-refresh every 2 seconds
            setInterval(loadBookings, 2000);
        });

        function setupEventListeners() {
            document.getElementById('surveyForm').addEventListener('submit', handleSubmit);
        }

        function renderCalendar() {
            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';
            
            // July 2026: starts on Wednesday (day 3), 31 days
            const firstDay = 3; // Wednesday
            const daysInMonth = 31;
            
            // Add empty cells for days before July 1
            for (let i = 0; i < firstDay; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'calendar-day empty';
                calendarDays.appendChild(emptyDay);
            }
            
            // Add days of July
            for (let day = 1; day <= daysInMonth; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'calendar-day';
                
                const dateStr = formatDate(day);
                
                // Check if date is booked
                const bookedPerson = bookings.find(b => b.date === dateStr);
                const isBooked = !!bookedPerson;
                
                // Disable past dates
                const today = new Date();
                const cellDate = new Date(2026, 6, day);
                const isPast = cellDate < today;
                
                const numEl = document.createElement('div');
                numEl.className = 'calendar-day-num';
                numEl.textContent = day;
                dayCell.appendChild(numEl);

                if (isBooked) {
                    dayCell.classList.add('booked');
                    dayCell.setAttribute('data-tooltip', `Booked by ${bookedPerson.name}`);
                    const nameEl = document.createElement('div');
                    nameEl.className = 'calendar-day-name';
                    nameEl.textContent = bookedPerson.name.split(' ')[0];
                    dayCell.appendChild(nameEl);
                } else if (isPast) {
                    dayCell.classList.add('disabled');
                } else {
                    dayCell.addEventListener('click', () => selectDate(dateStr, dayCell));
                }
                
                if (selectedDate === dateStr) {
                    dayCell.classList.add('selected');
                }
                
                calendarDays.appendChild(dayCell);
            }
        }

        function selectDate(dateStr, element) {
            document.querySelectorAll('.calendar-day.selected').forEach(el => {
                el.classList.remove('selected');
            });
            
            selectedDate = dateStr;
            element.classList.add('selected');
            
            const day = parseInt(dateStr.split('-')[2]);
            const date = new Date(2026, 6, day);
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formatted = date.toLocaleDateString('en-US', options);
            
            const selectedDateDiv = document.getElementById('selectedDate');
            selectedDateDiv.innerHTML = `✓ Selected: <strong>${formatted}</strong>`;
            selectedDateDiv.classList.add('active');
        }

        function formatDate(day) {
            return `2026-07-${String(day).padStart(2, '0')}`;
        }

        async function handleSubmit(e) {
            e.preventDefault();
            
            const name = document.getElementById('memberName').value.trim();
            const messageDiv = document.getElementById('formMessage');
            
            if (!name) {
                showMessage('Please enter your name', 'error', messageDiv);
                return;
            }
            
            if (!selectedDate) {
                showMessage('Please select a date', 'error', messageDiv);
                return;
            }
            
            // Check if name already exists
            if (bookings.some(b => b.name.toLowerCase() === name.toLowerCase())) {
                showMessage('This name is already registered. Each member can only book once.', 'error', messageDiv);
                return;
            }
            
            // Check if date is already booked
            if (bookings.some(b => b.date === selectedDate)) {
                showMessage('This date is already booked by someone else!', 'error', messageDiv);
                renderCalendar();
                return;
            }
            
            // Add booking
            const newBooking = {
                name: name,
                date: selectedDate,
                timestamp: new Date().toISOString()
            };
            
            bookings.push(newBooking);
            
            // Save to localStorage
            saveBookings();
            
            showMessage(`✓ Success! ${name} is scheduled for ${selectedDate}`, 'success', messageDiv);
            
            // Reset form
            setTimeout(() => {
                document.getElementById('surveyForm').reset();
                selectedDate = null;
                document.getElementById('selectedDate').classList.remove('active');
                document.querySelectorAll('.calendar-day.selected').forEach(el => {
                    el.classList.remove('selected');
                });
                messageDiv.innerHTML = '';
                renderCalendar();
            }, 1500);
        }

        function saveBookings() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(bookings));
            } catch (error) {
                console.error('Error saving bookings:', error);
            }
        }

        function loadBookings() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    bookings = JSON.parse(stored);
                } else {
                    bookings = [];
                }
                
                updateUI();
            } catch (error) {
                console.error('Error loading bookings:', error);
                bookings = [];
                updateUI();
            }
        }

        function updateUI() {
            updateBookingsList();
            renderCalendar();
            
            // Update refresh status
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('refreshStatus').textContent = `✓ Updated at ${timeStr}`;
            document.getElementById('refreshStatus').classList.remove('loading');
        }

        function updateBookingsList() {
            const bookingsList = document.getElementById('bookingsList');
            const totalBookings = document.getElementById('totalBookings');
            const availableDates = document.getElementById('availableDates');
            
            totalBookings.textContent = bookings.length;
            availableDates.textContent = 31 - bookings.length;
            
            if (bookings.length === 0) {
                bookingsList.innerHTML = '<div class="empty-message">No bookings yet. Be the first to schedule your visit!</div>';
                return;
            }
            
            // Sort bookings by date
            const sorted = [...bookings].sort((a, b) => new Date(a.date) - new Date(b.date));
            
            bookingsList.innerHTML = sorted.map((booking, index) => {
                const day = parseInt(booking.date.split('-')[2]);
                const date = new Date(2026, 6, day);
                const formatted = date.toLocaleDateString('en-US', { 
                    weekday: 'short', 
                    month: 'short', 
                    day: 'numeric' 
                });
                return `
                    <div class="booking-item">
                        <div class="booking-info">
                            <div class="booking-date">${formatted}</div>
                            <div class="booking-name">👤 ${booking.name}</div>
                        </div>
                        <div class="booking-badge">#${index + 1}</div>
                    </div>
                `;
            }).join('');
        }

        function exportToExcel() {
            try {
                if (bookings.length === 0) {
                    showMessage('No bookings to export!', 'info', document.getElementById('formMessage'));
                    return;
                }

                const data = [];
                data.push(["Date", "Day", "Name"]);
                
                const sorted = [...bookings].sort((a, b) => new Date(a.date) - new Date(b.date));
                sorted.forEach((booking) => {
                    const day = parseInt(booking.date.split('-')[2]);
                    const date = new Date(2026, 6, day);
                    const weekday = date.toLocaleDateString('en-US', { weekday: 'long' });
                    const fullDate = `July ${day}, 2026`;
                    data.push([fullDate, weekday, booking.name]);
                });

                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Market Bookings");

                ws['A1'].s = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "667eea" } } };
                ws['B1'].s = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "667eea" } } };
                ws['C1'].s = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "667eea" } } };

                ws['!cols'] = [{ wch: 15 }, { wch: 12 }, { wch: 20 }];

                XLSX.writeFile(wb, `Market_Bookings_July2026_${new Date().toISOString().split('T')[0]}.xlsx`);
                showMessage('📊 Excel file downloaded!', 'success', document.getElementById('formMessage'));
            } catch (error) {
                console.error('Error exporting to Excel:', error);
                showMessage('Error exporting to Excel. Please try again.', 'error', document.getElementById('formMessage'));
            }
        }

        function showMessage(text, type, element) {
            element.textContent = text;
            element.className = `message ${type}`;
            setTimeout(() => {
                element.className = 'message';
            }, 5000);
        }
    </script>
</body>
</html>
